<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actividad 3 - Cierre: Técnicas de Investigación</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="logo">🔬</div>
        <h1>Actividad 3 - Cierre</h1>
        <p class="subtitle">Técnicas de Investigación</p>
      </header>

      <main id="app">
        <!-- Paso 1: Datos del estudiante -->
        <section id="step-1" class="step active">
          <div class="card">
            <h2>📝 Datos del Estudiante</h2>
            <form id="student-form">
              <div class="form-group">
                <label for="name">Nombre(s)</label>
                <input type="text" id="name" required placeholder="Tu nombre" />
              </div>
              <div class="form-group">
                <label for="lastname">Apellidos</label>
                <input
                  type="text"
                  id="lastname"
                  required
                  placeholder="Tus apellidos"
                />
              </div>
              <div class="form-group">
                <label for="career">Carrera</label>
                <select id="career" required>
                  <option value="">Selecciona tu carrera</option>
                </select>
              </div>
              <div class="form-group">
                <label for="group">Grupo</label>
                <div class="radio-group">
                  <label class="radio-option">
                    <input type="radio" name="group" value="A" required />
                    <span class="radio-custom"></span>
                    Grupo A
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="group" value="B" required />
                    <span class="radio-custom"></span>
                    Grupo B
                  </label>
                </div>
              </div>
              <button type="submit" class="btn-primary">Comenzar →</button>
            </form>
          </div>
        </section>

        <!-- Paso 2: Desafío -->
        <section id="step-2" class="step">
          <div class="card matching-card">
            <div class="progress-bar">
              <div class="progress-fill" id="progress"></div>
            </div>
            <span class="progress-text" id="progress-text">Desafío 1 de 8</span>

            <div class="scenario-container">
              <div class="scenario-box">
                <span class="scenario-label">ESCENARIO</span>
                <p id="scenario-text"></p>
              </div>

              <div class="technique-options">
                <span class="technique-label"
                  >Selecciona la técnica adecuada:</span
                >
                <div id="technique-buttons" class="technique-buttons"></div>
              </div>
            </div>

            <div class="score-display">
              <span>Correctas: <strong id="correct-count">0</strong>/8</span>
            </div>
          </div>
        </section>

        <!-- Paso 3: Resultados -->
        <section id="step-3" class="step">
          <div class="card results-card">
            <div class="success-message" id="success-message">
              <div class="success-icon">🎉</div>
              <h2>¡Felicidades!</h2>
              <p>Copia este bloque para tu evidencia:</p>
              <div class="evidence-block" id="evidence-block"></div>
            </div>

            <div class="score-section">
              <div class="final-score">
                <span id="final-score">0%</span>
              </div>
              <p>Puntuación Final</p>
            </div>

            <div class="feedback-summary" id="feedback-summary"></div>

            <button id="restart-btn" class="btn-secondary">
              🔄 Nuevo Intento
            </button>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>Cultura Digital II - CETMAR 18</p>
      </footer>
    </div>

    <script src="main.js"></script>
  </body>
</html>
